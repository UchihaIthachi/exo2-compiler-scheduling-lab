name: Build LaTeX PDF

on:
  push:
    branches:
      - main
    paths:
      - 'report.md'
  pull_request:
    branches:
      - main
    paths:
      - 'report.md'
  workflow_dispatch:

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Pandoc and TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-extra texlive-fonts-recommended lmodern
          
      - name: Generate report.tex
        run: pandoc report.md -o report.tex -s
        
      - name: Compile PDF from LaTeX
        run: pdflatex report.tex
        
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: report.pdf
